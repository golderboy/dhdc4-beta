name: Production readiness

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, fileinfo, gd, intl, mbstring, pdo_mysql, xml, zip
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Lint tracked PHP files
        shell: bash
        run: git ls-files -z '*.php' | xargs -0 -n1 php -l

      - name: Run unit tests
        run: composer test

      - name: Run production readiness gate
        run: php tools/verify-production-readiness.php --strict-release
